# Workflow: Build and Push Staging Docker Containers
# Description: Builds and pushes amd64-only staging images for API and View on every master merge.
# Why: Provides a :staging floating tag and immutable :sha-* tags for pre-release validation,
#      completely separate from the :latest production tags pushed by build_container.yml.

name: Staging Package Manager

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository }}-api
  VIEW_IMAGE: ${{ github.repository }}-view
  API_PORT: 8443
  NEXT_PUBLIC_PORT: 7443

jobs:
  build-api:
    # Skip commits pushed by the release bot (chore(release): vX.Y.Z commits from release.yml)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Create .env file
        run: cp .env.sample api/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=sha-,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            API_PORT=${{ env.API_PORT }}
          cache-from: type=gha,scope=staging-api
          cache-to: type=gha,mode=max,scope=staging-api
          provenance: false

  build-view:
    # Skip commits pushed by the release bot (chore(release): vX.Y.Z commits from release.yml)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Create .env file
        run: cp .env.sample view/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for View
        id: meta-view
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.VIEW_IMAGE }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=sha-,format=short

      - name: Build and push View image
        uses: docker/build-push-action@v6
        with:
          context: ./view
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-view.outputs.tags }}
          labels: ${{ steps.meta-view.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_PORT=${{ env.NEXT_PUBLIC_PORT }}
          cache-from: type=gha,scope=staging-view
          cache-to: type=gha,mode=max,scope=staging-view
          provenance: false
