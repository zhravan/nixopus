# Workflow: Build CLI and Push to S3
# Description: Cross-compiles the nixopus CLI for Linux/macOS and uploads binaries to S3.
# Trigger: version tags (v*), published releases, or manual dispatch.
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID       - AWS credentials for S3 upload
#   AWS_SECRET_ACCESS_KEY   - AWS credentials for S3 upload
#   CLI_API_URL             - Production API URL (e.g. https://api.nixopus.com)
#   CLI_BETTER_AUTH_URL     - Production auth URL (e.g. https://auth.nixopus.com)
#   CLI_FRONTEND_URL        - Production frontend URL (e.g. https://app.nixopus.com)
#   CLI_OAUTH_CLIENT_ID     - OAuth client ID for CLI
#   CLI_AGENT_ENDPOINT      - Mastra agent endpoint (e.g. https://agent.nixopus.com)
#
# Required GitHub variables (or use secrets):
#   CLI_S3_BUCKET           - S3 bucket for CLI binaries
#   CLI_S3_REGION           - AWS region (default: us-east-1)

name: CLI Build and Push to S3

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLI_NAME: nixopus
  CLI_PKG: github.com/raghavyuva/nixopus-api/internal/cliconfig

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "VERSION=${github.event.release.tag_name#v}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v* ]]; then
            echo "VERSION=${github.ref_name#v}" >> $GITHUB_OUTPUT
          elif [ -f version.txt ]; then
            echo "VERSION=$(cat version.txt | sed 's/^v//')" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-$(date +%Y%m%d)-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build CLI for all platforms
        working-directory: api
        env:
          CLI_API_URL: ${{ secrets.CLI_API_URL }}
          CLI_BETTER_AUTH_URL: ${{ secrets.CLI_BETTER_AUTH_URL }}
          CLI_FRONTEND_URL: ${{ secrets.CLI_FRONTEND_URL }}
          CLI_OAUTH_CLIENT_ID: ${{ secrets.CLI_OAUTH_CLIENT_ID }}
          CLI_AGENT_ENDPOINT: ${{ secrets.CLI_AGENT_ENDPOINT }}
          CLI_INIT_TIMEOUT: ${{ vars.CLI_INIT_TIMEOUT || '30s' }}
          CLI_WORKFLOW_TIMEOUT: ${{ vars.CLI_WORKFLOW_TIMEOUT || '30m' }}
          CLI_WORKFLOW_ID: ${{ vars.CLI_WORKFLOW_ID || 'deploymentWorkflow' }}
        run: |
          set -e
          # Fallback for workflow_dispatch when secrets may be unset
          export CLI_API_URL="${CLI_API_URL:-https://api.nixopus.com}"
          export CLI_BETTER_AUTH_URL="${CLI_BETTER_AUTH_URL:-https://auth.nixopus.com}"
          export CLI_FRONTEND_URL="${CLI_FRONTEND_URL:-https://dashboard.nixopus.com}"
          export CLI_OAUTH_CLIENT_ID="${CLI_OAUTH_CLIENT_ID:-nixopus-cli}"
          export CLI_AGENT_ENDPOINT="${CLI_AGENT_ENDPOINT:-https://agent.nixopus.com}"
          export CLI_INIT_TIMEOUT="${CLI_INIT_TIMEOUT:-30s}"
          export CLI_WORKFLOW_TIMEOUT="${CLI_WORKFLOW_TIMEOUT:-30m}"
          export CLI_WORKFLOW_ID="${CLI_WORKFLOW_ID:-deploymentWorkflow}"

          LDFLAGS="-X ${CLI_PKG}.APIURL=$CLI_API_URL"
          LDFLAGS="$LDFLAGS -X ${CLI_PKG}.BetterAuthURL=$CLI_BETTER_AUTH_URL"
          LDFLAGS="$LDFLAGS -X ${CLI_PKG}.FrontendURL=$CLI_FRONTEND_URL"
          LDFLAGS="$LDFLAGS -X ${CLI_PKG}.OAuthClientID=$CLI_OAUTH_CLIENT_ID"
          LDFLAGS="$LDFLAGS -X ${CLI_PKG}.AgentEndpoint=$CLI_AGENT_ENDPOINT"
          LDFLAGS="$LDFLAGS -X ${CLI_PKG}.InitTimeout=$CLI_INIT_TIMEOUT"
          LDFLAGS="$LDFLAGS -X ${CLI_PKG}.WorkflowTimeout=$CLI_WORKFLOW_TIMEOUT"
          LDFLAGS="$LDFLAGS -X ${CLI_PKG}.WorkflowID=$CLI_WORKFLOW_ID"

          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p ../dist

          for pair in "linux:amd64" "linux:arm64" "darwin:amd64" "darwin:arm64" "windows:amd64" "windows:arm64"; do
            GOOS="${pair%%:*}"
            GOARCH="${pair##*:}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            OUT="../dist/${CLI_NAME}-${VERSION}-${GOOS}-${GOARCH}${EXT}"
            echo "Building $GOOS/$GOARCH -> $OUT"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "$OUT" ./cmd/nixopus
          done

          ls -la ../dist/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: dist/

  push-to-s3:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.CLI_S3_REGION || secrets.AWS_REGION || 'ap-south-1' }}

      - name: Push to S3
        run: |
          BUCKET="${{ vars.CLI_S3_BUCKET || secrets.CLI_S3_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "::error::Set CLI_S3_BUCKET (variable or secret) to upload CLI binaries to S3"
            exit 1
          fi
          VERSION="${{ needs.build.outputs.version }}"

          echo "Uploading CLI v${VERSION} to s3://${BUCKET}/cli/"
          for f in dist/*; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            aws s3 cp "$f" "s3://${BUCKET}/cli/${VERSION}/${NAME}" --acl public-read
            aws s3 cp "$f" "s3://${BUCKET}/cli/latest/${NAME}" --acl public-read
            echo "  -> $NAME"
          done
          echo "Done. Install: curl -sSL ... | tar xz -C /usr/local/bin"
