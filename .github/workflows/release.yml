# Workflow: Release
# Description: Generates a prerelease tag and GitHub pre-release
# Why: Provides prerelease builds for early testing

name: Create Release

on:
  workflow_dispatch:

jobs:
  tests:
    uses: ./.github/workflows/test.yaml
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

  security:
    uses: ./.github/workflows/security.yml

  create-release:
    needs: [tests, security]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.changelog.outputs.skipped == 'false' }}
      tag: ${{ steps.changelog.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      
      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-user-name: 'github-actions[bot]'
          git-user-email: 'github-actions[bot]@users.noreply.github.com'
          git-message: 'chore(release): {version}'
          preset: 'angular'
          tag-prefix: 'v'
          version-file: 'package.json'
          skip-on-empty: 'true'
          skip-ci: 'true'
          create-summary: 'true'
          pre-release: 'true'
          pre-release-identifier: 'alpha'
          git-push: 'false'
          release-count: 0

      - name: Regroup changelog by month
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: bash scripts/regroup-changelog.sh CHANGELOG.md

      - name: Update version.txt
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: echo "${{ steps.changelog.outputs.tag }}" > version.txt

      - name: Commit release artifacts
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add version.txt CHANGELOG.md package.json
          git tag -d "${{ steps.changelog.outputs.tag }}" 2>/dev/null || true
          git commit -m "chore(release): ${{ steps.changelog.outputs.tag }}"
          git tag "${{ steps.changelog.outputs.tag }}"
          git push origin HEAD:master --tags

      - name: Create GitHub Pre-Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          prerelease: true

      - name: Notify Discord about Pre-Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{ secrets.WEBHOOK_ID }}
          webhook_token: ${{ secrets.WEBHOOK_TOKEN }}
          username: "Release Bot"
          message: |
            - New pre-release published: **${{ steps.changelog.outputs.tag }}**
            - https://github.com/${{ github.repository }}/releases/tag/${{ steps.changelog.outputs.tag }}

  deploy-docs:
    needs: create-release
    if: ${{ needs.create-release.outputs.released == 'true' }}
    uses: ./.github/workflows/docs.yml
    secrets:
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}

  sync-api-client:
    needs: create-release
    if: ${{ needs.create-release.outputs.released == 'true' }}
    uses: ./.github/workflows/api-client-sync.yml
    secrets:
      API_CLIENT_REPO_TOKEN: ${{ secrets.API_CLIENT_REPO_TOKEN }}
