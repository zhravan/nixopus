# Workflow: Go Tests
# Runs all Go unit and integration tests using docker-compose-test.yml
# for Postgres, Redis, and Better Auth services

name: Test Nixopus API

on:
  pull_request:
    branches: [master]
    paths:
      - 'api/**'
      - 'docker-compose-test.yml'
      - '.github/workflows/test.yaml'
  push:
    branches: [master]
    paths:
      - 'api/**'
      - 'docker-compose-test.yml'
      - '.github/workflows/test.yaml'
  workflow_call:
    secrets:
      DEPLOY_KEY:
        required: false
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY || '' }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true
          cache-dependency-path: api/go.sum

      - name: Start test infrastructure
        env:
          NIXOPUS_AUTH_IMAGE: ghcr.io/nixopus/auth:latest
        run: |
          docker compose -f docker-compose-test.yml up -d --wait --wait-timeout 180
          docker compose -f docker-compose-test.yml ps

      - name: Build and start API server
        working-directory: api
        env:
          PORT: "8080"
          DATABASE_URL: postgresql://nixopus:nixopus@localhost:5433/nixopus_test
          REDIS_URL: redis://localhost:6379
          AUTH_SERVICE_URL: http://localhost:9090
          AUTH_SERVICE_SECRET: test-secret-for-ci
          ALLOWED_ORIGIN: http://localhost:3000,http://localhost:8080
          CADDY_PORT: "2019"
          ENV: test
        run: |
          go build -o bin/nixopus-api
          ./bin/nixopus-api &
          echo $! > /tmp/api-server.pid

          api_ready=0
          for i in {1..15}; do
            if curl -sf http://localhost:8080/api/v1/health >/dev/null 2>&1; then
              echo "API server is ready"
              api_ready=1
              break
            fi
            echo "Waiting for API server... attempt $i"
            sleep 2
          done
          if [ "$api_ready" -ne 1 ]; then
            echo "API server failed to become ready"
            exit 1
          fi

      - name: Run tests
        working-directory: api
        env:
          DB_HOST: localhost
          DB_PORT: "5433"
          DB_USER: nixopus
          DB_PASSWORD: nixopus
          DB_NAME: nixopus_test
          REDIS_URL: redis://localhost:6379
          AUTH_SERVICE_URL: http://localhost:9090
        run: go test -p 1 ./... -v -count=1

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose-test.yml logs

      - name: Cleanup
        if: always()
        run: |
          if [ -f /tmp/api-server.pid ]; then
            kill "$(cat /tmp/api-server.pid)" 2>/dev/null || true
          fi
          docker compose -f docker-compose-test.yml down -v
