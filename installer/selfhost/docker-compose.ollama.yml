services:
  nixopus-ollama:
    # Pre-seeded image has the default model baked in — no blocking pull step at install time.
    # Falls back to vanilla Ollama if the pre-seeded image isn't available yet;
    # in that case get.sh will pull the model in the background after startup.
    image: ${OLLAMA_IMAGE:-ghcr.io/nixopus/ollama:llama3.2-1b}
    container_name: nixopus-ollama
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - nixopus-ollama-data:/root/.ollama
    networks:
      - nixopus-network
    environment:
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2:1b}"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Merge into agent service: wait for Ollama before starting
  nixopus-agent:
    depends_on:
      nixopus-ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://nixopus-ollama:11434}"

volumes:
  nixopus-ollama-data:
