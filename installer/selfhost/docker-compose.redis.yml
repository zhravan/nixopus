services:
  nixopus-redis:
    image: redis:7-alpine
    container_name: nixopus-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - nixopus-redis-data:/data
    networks:
      - nixopus-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nixopus-redis-data:
